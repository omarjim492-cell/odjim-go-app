<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ODJIM Solution</title>

<meta name="theme-color" content="#0b3d91">
<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:linear-gradient(135deg,#0b3d91,#1e88e5);
min-height:100vh;
}

header{
text-align:center;
color:white;
padding:20px;
}

.logo-topo{
width:120px;
}

.menu-btn{
position:fixed;
top:15px;
left:15px;
font-size:25px;
background:#0b3d91;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
z-index:1000;
}

.menu-lateral{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:#1e88e5;
padding:20px;
transition:0.3s;
z-index:999;
color:white;
}

.menu-lateral button{
display:block;
width:100%;
margin:10px 0;
padding:10px;
border:none;
background:white;
color:#1e88e5;
border-radius:8px;
}

.section{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.btn{
background:linear-gradient(45deg,#ff9800,#ff5722);
color:white;
padding:14px;
border:none;
border-radius:10px;
font-weight:bold;
width:100%;
margin-top:10px;
cursor:pointer;
}

input, textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc;
}

#mapa{
height:350px;
border-radius:10px;
}

.whatsapp-btn{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:28px;
padding:15px;
border-radius:50%;
}

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b3d91;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
z-index:9999;
}

footer{
background:#333;
color:white;
text-align:center;
padding:15px;
margin-top:30px;
}

</style>

</head>

<body>

<a href="https://wa.me/244951945715" class="whatsapp-btn">
<i class="fab fa-whatsapp"></i>
</a>

<div id="splash">
<h2>ODJIM Solution</h2>
<p>Carregando serviços...</p>
</div>

<button class="menu-btn" onclick="abrirMenu()">☰</button>

<div id="menuLateral" class="menu-lateral">

<h2>ODJIM Solution</h2>

<button onclick="mostrar('inicio'); fecharMenu()">🏠 Início</button>
<button onclick="mostrar('servicos'); fecharMenu()">🛠 Serviços</button>
<button onclick="mostrar('solicitar'); fecharMenu()">📋 Solicitar</button>
<button onclick="mostrar('mapaSection'); fecharMenu()">📍 Técnicos próximos</button>
<button onclick="mostrar('historico'); fecharMenu()">📜 Histórico</button>
<button onclick="mostrar('tecnico'); fecharMenu()">👨‍🔧 Área do Técnico</button>
<button onclick="mostrar('contacto'); fecharMenu()">📞 Contactos</button>

</div>

<header>

<img src="logo_odjim1-512png.jpeg" class="logo-topo">

<h1>ODJIM Solution</h1>
<p>Serviços rápidos, soluções brilhantes</p>

</header>

<div class="section" id="inicio">

<div class="card">

<h2>Peça um serviço em segundos</h2>

<button class="btn" onclick="mostrar('solicitar')">🚀 Pedir Serviço</button>
<button class="btn" onclick="mostrar('mapaSection')">📍 Ver técnicos próximos</button>

</div>

</div>

<div class="section" id="mapaSection" style="display:none">

<div class="card">

<h2>📍 Técnicos próximos</h2>

<div id="mapa"></div>

<button class="btn" onclick="obterLocalizacaoMapa()">📍 Mostrar minha localização</button>

</div>

</div>

<div class="section" id="tecnico" style="display:none">

<div class="card">

<h2>👨‍🔧 Painel do Técnico</h2>

<input type="text" id="nomeTecnico" placeholder="Nome do técnico">

<button class="btn" onclick="ficarOnline()">🟢 Ficar Online</button>

<button class="btn" onclick="ficarOffline()">🔴 Ficar Offline</button>

<p id="estadoTecnico">Estado: Offline</p>

</div>

</div>

<footer>

ODJIM Solution © 2026

</footer>

<script>

const firebaseConfig={
apiKey:"SUA_CHAVE",
databaseURL:"SUA_DATABASE_URL"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let mapa
let marcadoresTecnicos={}

function iniciarMapa(){

mapa=L.map('mapa').setView([-8.8383,13.2344],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(mapa)

ouvirTecnicos()

}

function ouvirTecnicos(){

db.ref("tecnicos").on("value",snapshot=>{

snapshot.forEach(child=>{

let t=child.val()

if(!marcadoresTecnicos[t.nome]){

marcadoresTecnicos[t.nome]=L.marker([t.lat,t.lon]).addTo(mapa)
.bindPopup("🔧 "+t.nome)

}else{

marcadoresTecnicos[t.nome].setLatLng([t.lat,t.lon])

}

})

})

}

function ficarOnline(){

let nome=document.getElementById("nomeTecnico").value

navigator.geolocation.watchPosition(pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

db.ref("tecnicos/"+nome).set({

nome:nome,
lat:lat,
lon:lon,
online:true

})

})

document.getElementById("estadoTecnico").innerHTML="Online 🟢"

}

function ficarOffline(){

let nome=document.getElementById("nomeTecnico").value

db.ref("tecnicos/"+nome).remove()

document.getElementById("estadoTecnico").innerHTML="Offline 🔴"

}

function obterLocalizacaoMapa(){

navigator.geolocation.getCurrentPosition(function(pos){

let lat=pos.coords.latitude
let lon=pos.coords.longitude

mapa.setView([lat,lon],16)

L.marker([lat,lon]).addTo(mapa)

})

}

function mostrar(secao){

let secoes=["inicio","mapaSection","tecnico"]

secoes.forEach(s=>{

let el=document.getElementById(s)
if(el)el.style.display="none"

})

document.getElementById(secao).style.display="block"

}

function abrirMenu(){
document.getElementById("menuLateral").style.left="0"
}

function fecharMenu(){
document.getElementById("menuLateral").style.left="-250px"
}

window.onload=function(){

iniciarMapa()

setTimeout(function(){

document.getElementById("splash").style.display="none"

},2000)

}

</script>

</body>
</html>
