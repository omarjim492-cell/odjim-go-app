<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ODJIM Solution</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#0b3d91,#1e88e5);
color:white;
}

header{
text-align:center;
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
margin:15px;
border-radius:12px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#ff9800;
color:white;
border:none;
padding:12px;
margin-top:10px;
width:100%;
border-radius:8px;
}

.section{
display:none;
}

</style>

</head>

<body>

<header>

<h1>ODJIM Solution</h1>

<button onclick="mostrar('cliente')">Cliente</button>
<button onclick="mostrar('tecnico')">Técnico</button>
<button onclick="mostrar('admin')">Admin</button>

</header>

<!-- CLIENTE -->

<div id="cliente" class="section">

<div class="card">

<h2>Solicitar Serviço</h2>

<input id="nome" placeholder="Seu nome">

<input id="telefone" placeholder="Telefone">

<input id="localizacao" placeholder="Localização">

<select id="servico">

<option>Informática</option>
<option>Redes</option>
<option>CCTV</option>
<option>Electricidade</option>
<option>Ar condicionado</option>
<option>Canalização</option>
<option>Pintura</option>
<option>Limpeza</option>
<option>Babá</option>
<option>Jardinagem</option>
<option>Eletrodomésticos</option>

</select>

<textarea id="descricao" placeholder="Descreva o problema"></textarea>

<label>Data início</label>
<input type="date" id="dataInicio">

<label>Data fim</label>
<input type="date" id="dataFim">

<button onclick="solicitar()">Enviar pedido</button>

</div>

<div class="card">

<h2>Histórico</h2>

<div id="historico"></div>

</div>

<div class="card">

<h2>Avaliar Serviço</h2>

<select id="avaliacao">

<option value="5">Excelente ⭐⭐⭐⭐⭐</option>
<option value="4">Muito bom ⭐⭐⭐⭐</option>
<option value="3">Bom ⭐⭐⭐</option>
<option value="2">Regular ⭐⭐</option>
<option value="1">Mau ⭐</option>

</select>

<textarea id="comentario"></textarea>

<button onclick="avaliar()">Enviar avaliação</button>

</div>

</div>

<!-- TECNICO -->

<div id="tecnico" class="section">

<div class="card">

<h2>Pedidos disponíveis</h2>

<div id="pedidosTecnico"></div>

</div>

</div>

<!-- ADMIN -->

<div id="admin" class="section">

<div class="card">

<h2>Painel Admin</h2>

<p>Total pedidos:</p>

<div id="totalPedidos"></div>

</div>

<div class="card">

<h2>Avaliações</h2>

<div id="listaAvaliacoes"></div>

</div>

</div>

<script>

let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[]
let avaliacoes=JSON.parse(localStorage.getItem("avaliacoes"))||[]

function mostrar(id){

document.querySelectorAll(".section").forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

if(id==="tecnico") atualizarPedidosTecnico()

if(id==="cliente") atualizarHistorico()

if(id==="admin") atualizarAdmin()

}

function solicitar(){

let pedido={

nome:document.getElementById("nome").value,

telefone:document.getElementById("telefone").value,

local:document.getElementById("localizacao").value,

servico:document.getElementById("servico").value,

descricao:document.getElementById("descricao").value,

inicio:document.getElementById("dataInicio").value,

fim:document.getElementById("dataFim").value,

estado:"Aguardando"

}

pedidos.push(pedido)

localStorage.setItem("pedidos",JSON.stringify(pedidos))

alert("🔔 Novo pedido enviado!")

atualizarHistorico()

}

function atualizarHistorico(){

let h=document.getElementById("historico")

h.innerHTML=""

pedidos.forEach(p=>{

h.innerHTML+=`

<p>

<b>${p.servico}</b><br>

${p.local}<br>

${p.estado}

</p>

`

})

}

function atualizarPedidosTecnico(){

let lista=document.getElementById("pedidosTecnico")

lista.innerHTML=""

pedidos.forEach((p,i)=>{

lista.innerHTML+=`

<div>

<b>${p.servico}</b>

<p>${p.local}</p>

<button onclick="aceitar(${i})">Aceitar</button>

<button onclick="concluir(${i})">Concluir</button>

</div>

`

})

}

function aceitar(i){

pedidos[i].estado="Técnico a caminho"

localStorage.setItem("pedidos",JSON.stringify(pedidos))

atualizarPedidosTecnico()

}

function concluir(i){

pedidos[i].estado="Concluído"

localStorage.setItem("pedidos",JSON.stringify(pedidos))

atualizarPedidosTecnico()

}

function avaliar(){

let a={

nota:document.getElementById("avaliacao").value,

comentario:document.getElementById("comentario").value

}

avaliacoes.push(a)

localStorage.setItem("avaliacoes",JSON.stringify(avaliacoes))

alert("Obrigado pela avaliação ⭐")

}

function atualizarAdmin(){

document.getElementById("totalPedidos").innerText=pedidos.length

let lista=document.getElementById("listaAvaliacoes")

lista.innerHTML=""

avaliacoes.forEach(a=>{

lista.innerHTML+=`

<p>

Nota: ${a.nota} ⭐

<br>

${a.comentario}

</p>

`

})

}

mostrar("cliente")

</script>

</body>
</html>
