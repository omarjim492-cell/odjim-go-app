<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ODJIM Solution</title>

<link rel="manifest" href="manifest.json">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b3d91,#1e88e5);
color:white;
}

/* HEADER */

header{
text-align:center;
padding:20px;
font-size:30px;
font-weight:bold;
animation:fade 2s;
}

/* MENU */

.menu{
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.btn{
background:#ff9800;
border:none;
padding:18px;
width:100%;
font-size:18px;
color:white;
border-radius:10px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
background:#ff7700;
}

/* CARD */

.card{
background:white;
color:black;
margin:20px;
padding:20px;
border-radius:15px;
animation:fade 0.6s;
}

/* INPUT */

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#ff9800;
border:none;
padding:15px;
margin-top:15px;
width:100%;
color:white;
font-size:16px;
border-radius:10px;
}

.section{
display:none;
}

/* MAPA */

#mapa{
height:250px;
margin-top:10px;
border-radius:10px;
}

/* ANIMAÇÃO */

@keyframes fade{
from{opacity:0; transform:translateY(20px)}
to{opacity:1; transform:translateY(0)}
}

</style>

</head>

<body>

<header>

ODJIM Solution

</header>

<!-- MENU PRINCIPAL -->

<div class="menu">

<button class="btn" onclick="abrir('cliente')">Cliente</button>
<button class="btn" onclick="abrir('tecnico')">Técnico</button>
<button class="btn" onclick="abrir('admin')">Admin</button>

</div>

<!-- CLIENTE -->

<div id="cliente" class="section">

<div class="card">

<h2>Solicitar Serviço</h2>

<input id="nome" placeholder="Seu nome">

<input id="telefone" placeholder="Telefone">

<input id="localizacao" placeholder="Localização">

<select id="servico">

<option>Informática</option>
<option>Redes</option>
<option>CCTV</option>
<option>Electricidade</option>
<option>Ar condicionado</option>
<option>Canalização</option>
<option>Pintura</option>
<option>Limpeza</option>
<option>Babá</option>
<option>Design gráfico</option>
<option>Aplicação de móveis planejados</option>
<option>Acabamentos Civil</option>
<option>Arrumação de escritórios</option>

</select>

<textarea id="descricao" placeholder="Descreva o problema"></textarea>

<label>Data início</label>
<input type="date" id="inicio">

<label>Data fim</label>
<input type="date" id="fim">

<div id="mapa"></div>

<button onclick="enviarPedido()">Enviar pedido</button>

</div>

</div>

<!-- TECNICO -->

<div id="tecnico" class="section">

<div class="card">

<h2>Painel Técnico</h2>

<div id="listaPedidos"></div>

</div>

</div>

<!-- ADMIN -->

<div id="admin" class="section">

<div class="card">

<h2>Login Admin</h2>

<input id="adminUser" placeholder="Usuário">
<input id="adminPass" type="password" placeholder="Senha">

<button onclick="loginAdmin()">Entrar</button>

</div>

<div id="painelAdmin" style="display:none" class="card">

<h2>Gestão de Pedidos</h2>

<div id="adminPedidos"></div>

</div>

</div>

<script>

/* FIREBASE */

const firebaseConfig = {

apiKey: "COLE_AQUI",
authDomain: "COLE_AQUI",
projectId: "COLE_AQUI",
storageBucket: "COLE_AQUI",
messagingSenderId: "COLE_AQUI",
appId: "COLE_AQUI"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* MENU */

function abrir(sec){

document.querySelectorAll(".section").forEach(s=>s.style.display="none")

document.getElementById(sec).style.display="block"

}

/* ENVIAR PEDIDO */

function enviarPedido(){

let pedido={

nome:nome.value,
telefone:telefone.value,
local:localizacao.value,
servico:servico.value,
descricao:descricao.value,
inicio:inicio.value,
fim:fim.value,
estado:"Aguardando técnico"

}

db.collection("pedidos").add(pedido)

alert("Pedido enviado!")

}

/* RECEBER PEDIDOS EM TEMPO REAL */

db.collection("pedidos").onSnapshot((snapshot)=>{

let html=""

snapshot.forEach(doc=>{

let p=doc.data()

html+=`

<div style="border-bottom:1px solid #ccc;padding:10px">

<b>${p.servico}</b><br>
Local: ${p.local}<br>
Estado: ${p.estado}

<button onclick="aceitar('${doc.id}')">Aceitar</button>

</div>

`

})

listaPedidos.innerHTML=html
adminPedidos.innerHTML=html

})

/* ACEITAR PEDIDO */

function aceitar(id){

db.collection("pedidos").doc(id).update({

estado:"Técnico a caminho"

})

}

/* LOGIN ADMIN */

function loginAdmin(){

if(adminUser.value=="admin" && adminPass.value=="odjim2026"){

painelAdmin.style.display="block"

alert("Bem-vindo Administrador")

}else{

alert("Login inválido")

}

}

/* GOOGLE MAPS */

function initMap(){

let mapa = new google.maps.Map(document.getElementById("mapa"),{

center:{lat:-8.8383,lng:13.2344},

zoom:13

})

}

/* SERVICE WORKER */

if('serviceWorker' in navigator){

navigator.serviceWorker.register('service-worker.js')

}

</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=SUA_CHAVE_GOOGLE_MAPS&callback=initMap">
</script>

</body>
</html>
