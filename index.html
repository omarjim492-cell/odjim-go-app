<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ODJIM Solution</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b3d91,#1e88e5);
color:white;
}

header{
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.menu{
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.btn{
background:#ff9800;
border:none;
padding:18px;
width:100%;
font-size:18px;
color:white;
border-radius:10px;
}

.card{
background:white;
color:black;
margin:20px;
padding:20px;
border-radius:15px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#ff9800;
border:none;
padding:15px;
margin-top:15px;
width:100%;
color:white;
font-size:16px;
border-radius:10px;
}

.section{
display:none;
}

#mapa{
height:250px;
margin-top:10px;
border-radius:10px;
}

.pedido{
border-bottom:1px solid #ccc;
padding:10px;
}

</style>

</head>

<body>

<header>ODJIM Solution</header>

<div class="menu">

<button class="btn" onclick="abrir('cliente')">Cliente</button>
<button class="btn" onclick="abrir('tecnico')">Técnico</button>
<button class="btn" onclick="abrir('admin')">Admin</button>

</div>

<!-- CLIENTE -->

<div id="cliente" class="section">

<div class="card">

<h2>Solicitar Serviço</h2>

<input id="nome" placeholder="Seu nome">

<input id="telefone" placeholder="Telefone">

<input id="localizacao" placeholder="Localização">

<select id="servico">

<option>Informática</option>
<option>Redes</option>
<option>CCTV</option>
<option>Electricidade</option>
<option>Ar condicionado</option>
<option>Canalização</option>
<option>Pintura</option>
<option>Limpeza</option>

</select>

<textarea id="descricao" placeholder="Descreva o problema"></textarea>

<label>Data início</label>
<input type="date" id="inicio">

<label>Data fim</label>
<input type="date" id="fim">

<div id="mapa"></div>

<button onclick="enviarPedido()">Enviar pedido</button>

</div>

</div>

<!-- TECNICO -->

<div id="tecnico" class="section">

<div class="card">

<h2>Painel Técnico</h2>

<div id="listaPedidos"></div>

</div>

</div>

<!-- ADMIN -->

<div id="admin" class="section">

<div class="card">

<h2>Login Admin</h2>

<input id="adminUser" placeholder="Usuário">

<input id="adminPass" type="password" placeholder="Senha">

<button onclick="loginAdmin()">Entrar</button>

</div>

<div id="painelAdmin" style="display:none" class="card">

<h2>Gestão de Pedidos</h2>

<div id="adminPedidos"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "SUA_API_KEY",
authDomain: "odjim-solution.firebaseapp.com",
projectId: "odjim-solution",
storageBucket: "odjim-solution.appspot.com",
messagingSenderId: "SENDER_ID",
appId: "APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.abrir = function(sec){

document.querySelectorAll(".section").forEach(s=>s.style.display="none")

document.getElementById(sec).style.display="block"

}

window.enviarPedido = async function(){

const pedido = {

nome:document.getElementById("nome").value,
telefone:document.getElementById("telefone").value,
local:document.getElementById("localizacao").value,
servico:document.getElementById("servico").value,
descricao:document.getElementById("descricao").value,
inicio:document.getElementById("inicio").value,
fim:document.getElementById("fim").value,
estado:"Aguardando técnico"

}

await addDoc(collection(db,"pedidos"),pedido)

alert("Pedido enviado com sucesso!")

}

const pedidosRef = collection(db,"pedidos")

onSnapshot(pedidosRef,(snapshot)=>{

let html=""

snapshot.forEach((docSnap)=>{

const p = docSnap.data()

html+=`

<div class="pedido">

<b>${p.servico}</b><br>

Cliente: ${p.nome}<br>

Local: ${p.local}<br>

Estado: ${p.estado}<br>

<button onclick="aceitar('${docSnap.id}')">Aceitar</button>

</div>

`

})

document.getElementById("listaPedidos").innerHTML=html
document.getElementById("adminPedidos").innerHTML=html

})

window.aceitar = async function(id){

await updateDoc(doc(db,"pedidos",id),{

estado:"Técnico a caminho"

})

}

window.loginAdmin = function(){

if(
document.getElementById("adminUser").value==="admin" &&
document.getElementById("adminPass").value==="odjim2026"
){

document.getElementById("painelAdmin").style.display="block"

alert("Bem vindo administrador")

}

else{

alert("Login inválido")

}

}

</script>

<script>

let map = L.map('mapa').setView([-8.8383,13.2344],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{

}).addTo(map)

</script>

<script>

if('serviceWorker' in navigator){

navigator.serviceWorker.register('service-worker.js')

}

</script>

</body>
</html>
