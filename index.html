<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ODJIM Solution</title>

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b3d91,#1e88e5);
color:white;
}

/* HEADER */

header{
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

/* MENU */

.menu{
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.btn{
background:#ff9800;
border:none;
padding:16px;
font-size:18px;
color:white;
border-radius:10px;
}

.card{
background:white;
color:black;
margin:20px;
padding:20px;
border-radius:15px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#ff9800;
border:none;
padding:14px;
margin-top:15px;
width:100%;
color:white;
font-size:16px;
border-radius:10px;
}

.section{
display:none;
}

#mapa{
height:200px;
margin-top:10px;
border-radius:10px;
background:#eee;
}

</style>

</head>

<body>

<header>

ODJIM Solution

</header>

<!-- MENU -->

<div class="menu">

<button class="btn" onclick="abrir('cliente')">Cliente</button>
<button class="btn" onclick="abrir('tecnico')">Técnico</button>
<button class="btn" onclick="abrir('admin')">Admin</button>

</div>

<!-- CLIENTE -->

<div id="cliente" class="section">

<div class="card">

<h2>Solicitar Serviço</h2>

<input id="nome" placeholder="Seu nome">

<input id="telefone" placeholder="Telefone">

<input id="localizacao" placeholder="Localização">

<select id="servico">

<option>Informática</option>
<option>Redes</option>
<option>CCTV</option>
<option>Electricidade</option>
<option>Ar condicionado</option>
<option>Canalização</option>
<option>Pintura</option>
<option>Limpeza</option>
<option>Babá</option>
<option>Design gráfico</option>
<option>Aplicação de móveis planejados</option>
<option>Acabamentos Civil</option>
<option>Arrumação de escritórios</option>

</select>

<textarea id="descricao" placeholder="Descreva o problema"></textarea>

<label>Data início</label>
<input type="date" id="inicio">

<label>Data fim</label>
<input type="date" id="fim">

<div id="mapa">Mapa carregará aqui</div>

<button onclick="enviarPedido()">Enviar pedido</button>

</div>

</div>

<!-- TECNICO -->

<div id="tecnico" class="section">

<div class="card">

<h2>Painel Técnico</h2>

<div id="listaPedidos"></div>

</div>

</div>

<!-- ADMIN -->

<div id="admin" class="section">

<div class="card">

<h2>Login Admin</h2>

<input id="adminUser" placeholder="Usuário">
<input id="adminPass" type="password" placeholder="Senha">

<button onclick="loginAdmin()">Entrar</button>

</div>

<div id="painelAdmin" style="display:none" class="card">

<h2>Gestão de Pedidos</h2>

<div id="adminPedidos"></div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "COLE_AQUI",
authDomain: "COLE_AQUI",
projectId: "COLE_AQUI",
storageBucket: "COLE_AQUI",
messagingSenderId: "COLE_AQUI",
appId: "COLE_AQUI"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* MENU */

window.abrir=function(sec){

document.querySelectorAll(".section").forEach(s=>s.style.display="none")

document.getElementById(sec).style.display="block"

}

/* ENVIAR PEDIDO */

window.enviarPedido=async function(){

let pedido={

nome:document.getElementById("nome").value,
telefone:document.getElementById("telefone").value,
local:document.getElementById("localizacao").value,
servico:document.getElementById("servico").value,
descricao:document.getElementById("descricao").value,
inicio:document.getElementById("inicio").value,
fim:document.getElementById("fim").value,
estado:"Aguardando técnico"

}

await addDoc(collection(db,"pedidos"),pedido)

alert("Pedido enviado!")

}

/* RECEBER PEDIDOS */

onSnapshot(collection(db,"pedidos"),(snapshot)=>{

let html=""

snapshot.forEach(docSnap=>{

let p=docSnap.data()

html+=`

<div style="border-bottom:1px solid #ccc;padding:10px">

<b>${p.servico}</b><br>
Local: ${p.local}<br>
Estado: ${p.estado}

<button onclick="aceitar('${docSnap.id}')">Aceitar</button>

</div>

`

})

document.getElementById("listaPedidos").innerHTML=html
document.getElementById("adminPedidos").innerHTML=html

})

/* ACEITAR */

window.aceitar=async function(id){

await updateDoc(doc(db,"pedidos",id),{

estado:"Técnico a caminho"

})

}

/* LOGIN ADMIN */

window.loginAdmin=function(){

if(adminUser.value=="admin" && adminPass.value=="odjim2026"){

document.getElementById("painelAdmin").style.display="block"

alert("Bem-vindo Administrador")

}else{

alert("Login inválido")

}

}

</script>

<!-- GOOGLE MAPS (OPCIONAL) -->

<script>

function initMap(){

let mapa=document.getElementById("mapa")

mapa.innerHTML="Mapa disponível quando chave Google Maps for configurada"

}

</script>

</body>

</html>
