<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrador - ODJIM Solution</title>
  
  <!-- Fontes Premium -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Leaflet para Mapas -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <!-- FIREBASE (v10 Modular) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    const firebaseConfig = {
      apiKey: "Admin@007",
      databaseURL: "SUA_DATABASE_URL"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    // Expõe globalmente as dependências e o banco de dados do Realtime Database
    window.db = db;
    window.ref = ref;
    window.onValue = onValue;
    window.remove = remove;
  </script>
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --accent: #ff5722;
      --accent-hover: #e64a19;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --glass-bg: rgba(30, 41, 59, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --card-radius: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }
    body {
      background: radial-gradient(circle at top right, #1e1b4b, var(--bg-primary));
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      max-width: 900px;
      text-align: center;
      margin-top: 10px;
      margin-bottom: 25px;
    }
    header h2 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(to right, #ff5722, #ff9800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }
    header p {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 400;
    }
    /* Container Principal */
    .container {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }
    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
    /* Cards */
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      padding: 24px;
      border-radius: var(--card-radius);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    .card h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 4px solid var(--accent);
      padding-left: 10px;
    }
    /* Mapa */
    #mapaAdmin {
      height: 450px;
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      z-index: 1;
    }
    /* Lista de técnicos */
    .tecnicos-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 450px;
      overflow-y: auto;
    }
    .tecnico-item {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid var(--glass-border);
      padding: 12px 16px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: var(--transition);
    }
    .tecnico-item:hover {
      background: rgba(30, 41, 59, 0.7);
      border-color: rgba(255, 87, 34, 0.3);
    }
    .tecnico-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    .btn-remover {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-remover:hover {
      background: #ef4444;
      color: white;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
    .btn-voltar {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 10px 20px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      align-self: flex-start;
      transition: var(--transition);
    }
    .btn-voltar:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateX(-2px);
    }
  </style>
</head>
<body>
  <header>
    <h2>Painel Administrador</h2>
    <p>Monitoramento e Controle em Tempo Real - ODJIM Solution</p>
  </header>
  <a href="index.html" class="btn-voltar">
    <svg style="width:16px; height:16px; fill:currentColor" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Voltar ao App Principal
  </a>
  <div class="container">
    
    <!-- MAPA -->
    <div class="card">
      <h3>Mapa de Técnicos</h3>
      <div id="mapaAdmin"></div>
    </div>
    <!-- TÉCNICOS ONLINE -->
    <div class="card">
      <h3>Técnicos Online</h3>
      <div class="tecnicos-list" id="listaTecnicos">
        <div style="text-align: center; color: var(--text-muted); padding: 20px;">Carregando técnicos...</div>
      </div>
    </div>
  </div>
  <script>
    let mapaAdmin;
    let marcadores = {};
    function iniciarMapa() {
      // Coordenadas Luanda (-8.8383, 13.2344)
      mapaAdmin = L.map('mapaAdmin').setView([-8.8383, 13.2344], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
      }).addTo(mapaAdmin);
    }
    function ouvirTecnicos() {
      if (!window.db) {
        setTimeout(ouvirTecnicos, 500); // Aguarda inicialização do Firebase v10
        return;
      }
      const tecnicosRef = window.ref(window.db, "tecnicos");
      
      window.onValue(tecnicosRef, (snapshot) => {
        let listaHTML = "";
        const dados = snapshot.val();
        if (!dados) {
          listaHTML = `<div style="text-align: center; color: var(--text-muted); padding: 20px;">Nenhum técnico online no momento.</div>`;
          // Remove todos os marcadores do mapa
          Object.keys(marcadores).forEach(nome => {
            mapaAdmin.removeLayer(marcadores[nome]);
          });
          marcadores = {};
          document.getElementById("listaTecnicos").innerHTML = listaHTML;
          return;
        }
        // Loop sobre os técnicos
        Object.keys(dados).forEach((key) => {
          const t = dados[key];
          
          listaHTML += `
            <div class="tecnico-item">
              <div class="tecnico-info">
                <span>🔧</span>
                <span>${t.nome}</span>
              </div>
              <button class="btn-remover" onclick="removerTecnico('${key}')">Remover</button>
            </div>
          `;
          // Gerenciar marcador no mapa
          if (t.lat && t.lon) {
            if (!marcadores[t.nome]) {
              marcadores[t.nome] = L.marker([t.lat, t.lon])
                .addTo(mapaAdmin)
                .bindPopup("<b>🔧 Técnico:</b> " + t.nome);
            } else {
              marcadores[t.nome].setLatLng([t.lat, t.lon]);
            }
          }
        });
        // Limpar marcadores de técnicos que saíram
        Object.keys(marcadores).forEach(nome => {
          const aindaExiste = Object.values(dados).some(t => t.nome === nome);
          if (!aindaExiste) {
            mapaAdmin.removeLayer(marcadores[nome]);
            delete marcadores[nome];
          }
        });
        document.getElementById("listaTecnicos").innerHTML = listaHTML;
      });
    }
    async function removerTecnico(nome) {
      if (confirm(`Deseja realmente remover o técnico "${nome}"?`)) {
        try {
          const tecnicoRef = window.ref(window.db, `tecnicos/${nome}`);
          await window.remove(tecnicoRef);
          alert("Técnico removido com sucesso!");
        } catch (error) {
          console.error("Erro ao remover técnico: ", error);
          alert("Não foi possível remover o técnico.");
        }
      }
    }
    // Expor a função globalmente para o clique de botão
    window.removerTecnico = removerTecnico;
    window.onload = function() {
      iniciarMapa();
      ouvirTecnicos();
    };
  </script>
</body>
</html>
